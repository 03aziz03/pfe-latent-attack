# Phase 3 — Baseline
#
# Identical hyperparameters to the best Phase 2 configuration
# (Option 1: original SD-VAE + LPIPS, lambda_p=0.001, eps_z=0.50).
# All Phase 3 extensions disabled. This is the reference point against
# which improvements 3A–3D are measured.
#
# Run this first to confirm reproducibility before activating new features.

# ---- detector ----
detector:
  weights: "runs/yolov8n_detrac/best.pt"
  conf_thr: 0.25
  iou_nms: 0.45
  imgsz: 640

# ---- VAE ----
vae:
  model_id: "stabilityai/sd-vae-ft-mse"
  scale: 0.18215
  # finetuned_weights intentionally omitted — original SD-VAE only

# ---- attack ----
attack:
  eps_z: 0.50
  gamma: 0.05
  lambda_p: 0.001
  lambda_r: 1.0e-3
  lr: 0.01
  num_steps: 80
  early_stop: true
  early_stop_margin: 0.0
  use_lpips: true
  lpips_net: "alex"

  # Phase 3 extensions — all disabled for baseline
  use_objectness: false
  obj_weight: 0.5
  use_momentum: false
  momentum_decay: 0.9
  n_restarts: 1
  restart_noise: 0.5
  use_ssim: false
  ssim_weight: 0.3

# ---- baselines (pixel-space) ----
baselines:
  eps_pixel: 0.0314
  pgd_steps: 50
  pgd_alpha: 0.00392
  mask_restricted: true

# ---- runtime ----
runtime:
  device: "cuda"
  dtype: "float32"
  seed: 0
